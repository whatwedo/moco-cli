version: "2"

linters:
  default: standard
  enable:
    - misspell
    - unconvert
    - bodyclose
  # Generated files carry the standard "Code generated ... DO NOT EDIT." header
  # and are excluded automatically (exclusions.generated defaults to "lax").

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/whatwedo/moco-cli
