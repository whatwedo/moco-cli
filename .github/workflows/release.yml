name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Configure Homebrew tap deploy key
        env:
          TAP_DEPLOY_KEY: ${{ secrets.TAP_DEPLOY_KEY }}
        run: |
          if [ -n "$TAP_DEPLOY_KEY" ]; then
            install -m 700 -d "$HOME/.ssh"
            printf '%s\n' "$TAP_DEPLOY_KEY" > "$HOME/.ssh/moco_tap_key"
            chmod 600 "$HOME/.ssh/moco_tap_key"
            ssh-keyscan github.com >> "$HOME/.ssh/known_hosts" 2>/dev/null
          fi
      - uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # SSH deploy key (write) for whatwedo/homebrew-moco, used to publish the
          # Homebrew cask. If the secret is unset the cask step is skipped (see
          # skip_upload in .goreleaser.yaml) so the release still succeeds.
          TAP_DEPLOY_KEY: ${{ secrets.TAP_DEPLOY_KEY }}
