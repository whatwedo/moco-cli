version: 2

builds:
  - id: moco
    main: ./cmd/moco
    binary: moco
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    mod_timestamp: "{{ .CommitTimestamp }}"
    ldflags:
      - -s -w -X main.version={{ .Version }}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: moco
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats:
          - zip

homebrew_casks:
  - name: moco
    binaries:
      - moco
    repository:
      owner: whatwedo
      name: homebrew-moco
      branch: main
      # Push via SSH using a deploy key scoped to the tap repo (set up in CI),
      # instead of an account-wide token.
      git:
        url: "git@github.com:whatwedo/homebrew-moco.git"
        private_key: "{{ .Env.HOME }}/.ssh/moco_tap_key"
    # Skip publishing the cask when no tap deploy key is configured, so releases
    # still succeed before the TAP_DEPLOY_KEY secret is set up.
    skip_upload: '{{ if .Env.TAP_DEPLOY_KEY }}false{{ else }}true{{ end }}'
    homepage: "https://github.com/whatwedo/moco-cli"
    description: "Command-line client for the MOCO API v1"
    # The binaries are not code-signed; drop the macOS quarantine attribute so
    # Gatekeeper does not block the freshly installed binary.
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/moco"]
          end

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

release:
  draft: false
